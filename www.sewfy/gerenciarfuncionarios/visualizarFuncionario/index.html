<div class="funcionariomodal">
  <div class="modal-container">
    <!-- Header -->
    <div class="modal-header">
      <h2 class="modal-title">Detalhes do Funcionario</h2>
      <button class="material-symbols-outlined modal-close">close</button>
    </div>

    <!-- Content -->
    <div class="modal-content">
      <div class="details-grid">
        <div class="detail">
          <span class="label">Nome *</span>
          <span id="modal-nome" data-field="nome"></span>
        </div>

        <div class="detail">
          <span class="label">Cadastro *</span>
          <span class="value" id="modal-ativo" data-field="ativo"></span>
        </div>

        <div class="detail">
          <span class="label">Email *</span>
          <span  id="modal-email" data-field="email"></span>
        </div>

        <div class="detail">
          <span class="label">Número de telefone *</span>
          <span class="value" id="modal-telefone" data-field="telefone"></span>
        </div>
        <div class="detail col-span-2">
          <button class="btn-editar-funcionario">Editar Funcionario</button>
        </div>
      </div>
    </div>
  </div>
</div>
