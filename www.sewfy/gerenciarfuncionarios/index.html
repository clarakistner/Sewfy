<div class="containerConfigOwner">
  <div class="gerenciarFuncionarios">
    <h3>Gerenciar Funcionários</h3>
    <div class="corpoGerenciar">
      <div class="filtros">
        <div class="input-pesquisa">
          <svg
            class="icone-lupa"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>

          <input type="text" placeholder="Pesquisar por nome..." />
        </div>
      </div>
      <div id="listaFuncionarios" class="lista-funcionarios">
        <table class="table">
          <thead class="table-head">
            <tr class="table-head-row">
              <th class="table-head-cell">Nome</th>
              <th class="table-head-cell">Email</th>
              <th class="table-head-cell">Telefone</th>
              <th class="table-head-cell">Ação</th>
            </tr>
          </thead>

          <tbody id="funcionarios-table" class="table-body">
            <!-- Linhas de fornecedores serão inseridas aqui dinamicamente -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
